name: Repository checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Verify portfolio files
        run: |
          test -s README.md
          test -s LICENSE
      - name: Install dependencies
        run: npm ci --ignore-scripts

